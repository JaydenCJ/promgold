<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" font-family="Menlo, Consolas, monospace" font-size="14">
  <rect width="760" height="400" rx="10" fill="#101418"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="22" r="6" fill="#27c93f"/>
  <text x="380" y="27" fill="#8b949e" text-anchor="middle" font-size="12">promgold — your /metrics endpoint is an API. Lock it.</text>
  <g fill="#c9d1d9">
    <text x="24" y="62"><tspan fill="#7ee787">$</tspan> promgold check http://127.0.0.1:9102/metrics</text>
    <text x="24" y="92"><tspan fill="#79c0ff">promgold check</tspan> — 3 breaking, 2 risky, 0 informational (4 golden vs 3 current families)</text>
    <text x="24" y="126"><tspan fill="#f85149">BREAKING</tspan>  http_request_duration_seconds  histogram bucket le="0.5" removed</text>
    <text x="24" y="148"><tspan fill="#f85149">BREAKING</tspan>  http_requests_total            label "code" removed (selectors and</text>
    <text x="24" y="170">                                          by(code) clauses stop matching)</text>
    <text x="24" y="192"><tspan fill="#f85149">BREAKING</tspan>  queue_depth                    metric no longer exposed</text>
    <text x="24" y="214"><tspan fill="#d29922">RISKY</tspan>     http_requests_total            new label "status_code" (existing</text>
    <text x="24" y="236">                                          series split; sum/avg results change)</text>
    <text x="24" y="258"><tspan fill="#d29922">RISKY</tspan>     http_requests_total            new label "tenant" (existing series</text>
    <text x="24" y="280">                                          split; sum/avg results change)</text>
    <text x="24" y="318">contract: <tspan fill="#f85149">BROKEN</tspan> — 3 changes at or above fail-on=breaking</text>
    <text x="24" y="352"><tspan fill="#7ee787">$</tspan> echo $?</text>
    <text x="24" y="374"><tspan fill="#f85149">1</tspan>   <tspan fill="#8b949e"># dashboards saved before the deploy, not weeks after</tspan></text>
  </g>
</svg>
